stages:
  - lint
  - test
  - build
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

cache:
  paths:
    - .cache/

backend-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install ruff
    - ruff check backend/
    - ruff format --check backend/

backend-test:
  stage: test
  image: python:3.12-slim
  variables:
    RATE_LIMIT_DEFAULT: "999/minute"
    RATE_LIMIT_REGISTER: "999/minute"
    RATE_LIMIT_LOGIN: "999/minute"
    RATE_LIMIT_EXTERNAL: "999/minute"
  script:
    - pip install -r backend/requirements.txt
    - cd backend && uvicorn app.main:app --host 127.0.0.1 --port 8004 &
    - for i in $(seq 1 30); do curl -sf http://127.0.0.1:8004/api/v1/health && break || sleep 1; done
    - python "$CI_PROJECT_DIR/e2e/test_e2e.py"

frontend-typecheck:
  stage: lint
  image: node:20-slim
  script:
    - cd frontend && npm ci
    - npx tsc --noEmit

frontend-build:
  stage: build
  image: node:20-slim
  script:
    - cd frontend && npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week

auto-tag:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - apk add --no-cache git grep
    - VERSION=$(grep -oP '## \[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1)
    - |
      if [ -z "$VERSION" ]; then
        echo "No version found in CHANGELOG.md"
        exit 0
      fi
    - TAG="v$VERSION"
    - |
      if ! git rev-parse "$TAG" >/dev/null 2>&1; then
        git remote set-url origin "https://oauth2:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git tag "$TAG"
        git push origin "$TAG"
        echo "Tagged $TAG"
      else
        echo "Tag $TAG already exists, skipping"
      fi
