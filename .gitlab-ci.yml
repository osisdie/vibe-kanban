stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

cache:
  paths:
    - .cache/

backend-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install ruff
    - ruff check backend/
    - ruff format --check backend/

backend-test:
  stage: test
  image: python:3.12-slim
  variables:
    RATE_LIMIT_DEFAULT: "999/minute"
    RATE_LIMIT_REGISTER: "999/minute"
    RATE_LIMIT_LOGIN: "999/minute"
    RATE_LIMIT_EXTERNAL: "999/minute"
  script:
    - pip install -r backend/requirements.txt
    - cd backend && uvicorn app.main:app --host 127.0.0.1 --port 8004 &
    - sleep 3
    - python "$CI_PROJECT_DIR/e2e/test_e2e.py"

frontend-typecheck:
  stage: lint
  image: node:20-slim
  script:
    - cd frontend && npm ci
    - npx tsc --noEmit

frontend-build:
  stage: build
  image: node:20-slim
  script:
    - cd frontend && npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
