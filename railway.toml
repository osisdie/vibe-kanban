[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Dockerfile WORKDIR is /app/backend, so no "cd" needed
startCommand = "gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:${PORT:-8004} --access-logfile -"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Railway PostgreSQL setup:
#   1. In Railway dashboard: Add Service > PostgreSQL
#   2. Link it to this app
#   3. Set DATABASE_URL on app service:
#      postgresql+asyncpg://${{Postgres.PGUSER}}:${{Postgres.PGPASSWORD}}@${{Postgres.PGHOST}}:${{Postgres.PGPORT}}/${{Postgres.PGDATABASE}}
