[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand — Dockerfile CMD handles $PORT via shell form
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Railway PostgreSQL setup:
#   1. In Railway dashboard: Add Service > PostgreSQL
#   2. Link it to this app
#   3. Set DATABASE_URL on app service:
#      postgresql+asyncpg://${{Postgres.PGUSER}}:${{Postgres.PGPASSWORD}}@${{Postgres.PGHOST}}:${{Postgres.PGPORT}}/${{Postgres.PGDATABASE}}
