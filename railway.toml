[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "cd backend && gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:${PORT:-8004} --access-logfile -"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Railway injects DATABASE_URL from the linked PostgreSQL service automatically.
# Steps:
#   1. In Railway dashboard: Add Service > PostgreSQL
#   2. Link it to this app - the DATABASE_URL env var is auto-set
#   3. Override DATABASE_URL to use asyncpg driver:
#      DATABASE_URL = postgresql+asyncpg://${{Postgres.PGUSER}}:${{Postgres.PGPASSWORD}}@${{Postgres.PGHOST}}:${{Postgres.PGPORT}}/${{Postgres.PGDATABASE}}
