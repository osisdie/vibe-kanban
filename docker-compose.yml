services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: kanban
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      - FRONTEND_URL=http://localhost:8004
      - DATABASE_URL=postgresql+asyncpg://kanban:kanban@postgres:5432/kanban
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pg-data:
