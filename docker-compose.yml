services:
  app:
    build: .
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      - FRONTEND_URL=http://localhost:8004
    volumes:
      - app-data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
